<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GomokuAI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div id="wrapper">
        <div id="board" class="board paused disabled"></div>
        <div id="dashBoard">
            <h1>GomokuAI</h1>
            <div id="versus-tab">
                <div class="player-config">
                    <div class="player-box">
                        <span class="player-label">Black Player</span>
                        <select class="player-select" id="black-player-type">
                            <option value="human">Human</option>
                            <option value="random">AI - Random</option>
                            <option value="python">AI - Python</option>
                            <option value="csharp">AI - C#</option>
                        </select>
                    </div>

                    <div class="vs-divider">vs</div>

                    <div class="player-box">
                        <span class="player-label">White Player</span>
                        <select class="player-select" id="white-player-type">
                            <option value="human">Human</option>
                            <option value="random">AI - Random</option>
                            <option value="python">AI - Python</option>
                            <option value="csharp">AI - C#</option>
                        </select>
                    </div>
                </div>
                <div class="timeout-container">
                    <div class="stat-label">AI Thinking Delay: <span id="delay-display">1.0</span>s</div>
                    <input type="range" id="ai-delay-input" min="0.1" max="2" step="0.1" value="1.0" class="slider">
                </div>
            </div>
            <div id="ai-tab-black" class="ai-tab">
                <div id="analysis" class="analysis-panel">
                    <h2>AI Analysis <p style="color: #e5c591;">Black</p>
                    </h2>
                    <div id="calc-res">
                        <div><span class="stat-label">Time (sec)</span><span id="resTimeValB"
                                class="stat-value">-</span>
                        </div>
                        <div><span class="stat-label">Nodes</span><span id="resCountValB" class="stat-value">-</span>
                        </div>
                    </div>
                    <div id="calc-info">
                        <div><span class="stat-label">Depth</span><span id="depthValB" class="stat-value">-</span></div>
                        <div><span class="stat-label">NPS</span><span id="speedValB" class="stat-value">-</span></div>
                    </div>
                </div>
            </div>
            <div id="ai-tab-white" class="ai-tab">
                <div id="analysis" class="analysis-panel">
                    <h2>AI Analysis <p style="color: #e5c591;">White</p>
                    </h2>
                    <div id="calc-res">
                        <div><span class="stat-label">Time (sec)</span><span id="resTimeValW"
                                class="stat-value">-</span>
                        </div>
                        <div><span class="stat-label">Nodes</span><span id="resCountValW" class="stat-value">-</span>
                        </div>
                    </div>
                    <div id="calc-info">
                        <div><span class="stat-label">Depth</span><span id="depthValW" class="stat-value">-</span></div>
                        <div><span class="stat-label">NPS</span><span id="speedValW" class="stat-value">-</span></div>
                    </div>
                </div>
            </div>

            <div id="button-controls" class="button-bar">
                <button class="button" id="restart">Restart</button>
                <button class="button" id="startPause">Start</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
